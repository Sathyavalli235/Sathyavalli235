<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathya Vallinayagam - Portfolio</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4fc3f7, #81d4fa);
        color: #333;
    }

    .header {
        background: rgba(0, 0, 0, 0.8);
        padding: 20px 0;
        text-align: center;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 100;
    }

    .header ul {
        list-style: none;
        display: flex;
        justify-content: center;
    }

    .header ul li {
        margin: 0 20px;
    }

    .header ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 18px;
    }

    .hero-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        padding-top: 60px;
    }

    .hero-content {
        max-width: 600px;
    }

    .profile-picture {
        border-radius: 50%;
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
    }

    .headline {
        font-size: 2.5rem;
        color: #fff;
    }

    .tagline {
        font-size: 1.2rem;
        color: #f5f5f5;
        margin-bottom: 20px;
    }

    .cta-buttons {
        display: flex;
        gap: 20px;
    }

    .btn {
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-size: 1rem;
        color: #fff;
    }

    .primary-btn {
        background-color: #f06292;
    }

    .secondary-btn {
        background-color: #4fc3f7;
    }

    .skills-section {
        padding: 50px 0;
        background-color: #fff;
        text-align: center;
    }

    .skills-icons {
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .skill img {
        width: 50px;
    }

    .featured-project-section {
        padding: 50px;
        text-align: center;
    }

    .project {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .project-img {
        width: 300px;
        margin-right: 20px;
    }

    .contact-section {
        padding: 50px;
        background-color: #f5f5f5;
        text-align: center;
    }

    .contact-form input, .contact-form textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
    }

    .social-links {
        margin-top: 20px;
        text-align: center;
    }

    .social-links a {
        margin: 0 10px;
        color: #fff;
        text-decoration: none;
    }

    footer {
        padding: 20px;
        background-color: #333;
        color: #fff;
        text-align: center;
        margin-top: 50px;
    }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="About.html">About</a></li>
                    <li><a href="Projects.html">Projects</a></li>
                    <li><a href="Contact.html">Contact</a></li>
                    <li><a href="resume.html" class="btn" download>Download CV</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home" class="hero-section">
        <div class="hero-content">
            <img src="./img/Profile.jpg" alt="Sathya Vallinayagam" class="profile-picture">
            <h1 class="headline">Hello, I'm <span class="typing-effect">Sathya Vallinayagam</span></h1>
            <p class="tagline">Web Designing | Creating Seamless Digital Experiences</p>
        </div>
    </section>
</body>
</html>
